<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="homepage.css">
</head>
<body>
  <nav class="navbar navbar-dark topbar px-4">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="img/landing/logo.png" height="35" class="me-2">
      <span class="fw-bold text-white">Green garden</span>
    </a>
    <div class="ms-auto d-flex align-items-center">
      <div class="me-4 text-end text-white">
        <div id="date" class="small"></div>
        <div id="time" class="fw-bold"></div>
      </div>
      <span class="admin-box">Admin</span>
      <a href="#" class="btn btn-danger px-4 ms-2">Logout</a>
    </div>
  </nav>
  <div class="d-flex">
    <div class="sidebar">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Add Client</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Available Plans</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Client Records</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#">Employee</a>
        </li>
      </ul>
    </div>
    <div class="content">
      <h4 class="mb-4">Dashboard</h4>
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Employees</h5>
            <a href="add-employee.html">
              <button class="btn btn-primary px-4">Add Employee</button>
            </a>
          </div>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Position</th>
                  <th>Contact</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Juan Dela Cruz</td>
                  <td>Field Staff</td>
                  <td>09123456789</td>
                  <td><span class="badge bg-success">Active</span></td>
                  <td>
                    <a href="employee-details.html">
                      <button class="btn btn-sm btn-outline-primary">View</button>
                    </a>
                  </td>
                </tr>
                <tr>
                  <td>Maria Santos</td>
                  <td>Office Staff</td>
                  <td>09987654321</td>
                  <td><span class="badge bg-secondary">Inactive</span></td>
                  <td>
                    <a href="employee-details.html">
                      <button class="btn btn-sm btn-outline-primary">View</button>
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString();
      const time = now.toLocaleTimeString();
      document.getElementById("date").textContent = date;
      document.getElementById("time").textContent = time;
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
