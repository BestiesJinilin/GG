<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Employee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="homepage.css">
</head>
<body>
  <nav class="navbar navbar-dark topbar px-4">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="img/landing/logo.png" height="35" class="me-2">
      <span class="fw-bold text-white">Green garden</span>
    </a>
    <div class="ms-auto d-flex align-items-center">
      <div class="me-4 text-end text-white">
        <div id="date" class="small"></div>
        <div id="time" class="fw-bold"></div>
      </div>
      <span class="admin-box">Admin</span>
      <a href="#" class="btn btn-danger px-4 ms-2">Logout</a>
    </div>
  </nav>
  <div class="d-flex">
    <div class="sidebar">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Add Client</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Available Plans</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Client Records</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#">Employee</a>
        </li>
      </ul>
    </div>
    <div class="content">
      <h4 class="mb-4">Edit Employee</h4>
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h5 class="mb-3">Update Employee Details</h5>
          <form>
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" value="Juan">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Middle Name</label>
                <input type="text" class="form-control" value="Dela">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" value="Cruz">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Employee ID</label>
                <input type="text" class="form-control" value="EMP-001">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" value="1995-05-10">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Government ID</label>
                <input type="text" class="form-control" value="123456789">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" value="09123456789">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="juan@email.com">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" value="Quezon City">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Emergency Contact Name</label>
                <input type="text" class="form-control" value="Maria Cruz">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Emergency Contact Number</label>
                <input type="text" class="form-control" value="09987654321">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Job Title</label>
                <select class="form-select">
                  <option value="Field Staff" selected>Field Staff</option>
                  <option value="Office Staff">Office Staff</option>
                </select>
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Department</label>
                <input type="text" class="form-control" value="Operations">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Hire Date</label>
                <input type="date" class="form-control" value="2024-01-15">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Employment Status</label>
                <select class="form-select">
                  <option>Full-time</option>
                  <option>Part-time</option>
                  <option>Contract</option>
                  <option>Intern</option>
                </select>
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Work Location</label>
                <input type="text" class="form-control" value="Main Branch">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Supervisor</label>
                <input type="text" class="form-control" value="Pedro Reyes">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Bank Account</label>
                <input type="text" class="form-control" value="1234567890">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Salary</label>
                <input type="number" class="form-control" value="15000">
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary px-4">Update Employee</button>
                <a href="employee-details.html" class="btn btn-secondary px-4 ms-2">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("date").textContent = now.toLocaleDateString();
      document.getElementById("time").textContent = now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
